name: Mirror Upstream

on:
  schedule:
    - cron: '0 * * * *'   # Every hour
  workflow_dispatch:

jobs:
  mirror:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.SYNC_PAT }}

      - name: Mirror upstream
  run: |
    git remote add upstream https://github.com/ProjectIgnis/bin.git || true
    git fetch upstream

    # Save your workflows
    mkdir -p /tmp/workflows
    cp -r .github/workflows /tmp/workflows 2>/dev/null || true

    # Mirror upstream
    git reset --hard upstream/master

    # Restore your workflows
    rm -rf .github/workflows
    mkdir -p .github
    cp -r /tmp/workflows .github/ 2>/dev/null || true

    git add .github/workflows

    if ! git diff --cached --quiet; then
      git commit -m "Restore local workflows"
    fi

    git push --force origin master